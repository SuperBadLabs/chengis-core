name: test

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  LEIN_JVM_OPTS: '--enable-native-access=ALL-UNNAMED'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure + Leiningen
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('project.clj') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: lein test
        run: lein test

      - name: Verify lein install works (consumer smoke)
        run: lein install
